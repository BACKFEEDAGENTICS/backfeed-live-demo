<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Hope You're Happy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:#0a0d0b;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:32px 16px;
  }
  .cover{
    position:relative;
    width:min(520px,100%);
    aspect-ratio:1/1;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.6);
  }
  .cover img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:50% 35%;
  }
  /* just enough shade at the bottom to keep the title legible */
  .cover .scrim{
    position:absolute;inset:0;
    background:linear-gradient(transparent 45%, rgba(0,0,0,.75) 100%);
  }
  .title{
    position:absolute;left:28px;bottom:26px;right:28px;
    color:#fff;
    font-family:"Arial Black","Helvetica Neue",sans-serif;
    font-weight:900;
    font-size:clamp(30px,7vw,52px);
    line-height:.95;
    letter-spacing:-.02em;
    text-transform:uppercase;
    text-shadow:0 2px 20px rgba(0,0,0,.6);
  }
  .title .happy{color:#e8743b}
</style>
</head>
<body>
  <div class="cover">
    <img src="hope-youre-happy.jpg" alt="I Hope You're Happy" />
    <div class="scrim"></div>
    <h1 class="title">I Hope You're <span class="happy">Happy</span></h1>
  </div>
</body>
</html>
