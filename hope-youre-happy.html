<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Hope You're Happy — Cover</title>
<style>
  :root{
    --ink:#0c0f0d;
    --moss:#1b2a22;
    --fog:#9fb3a6;
    --rain:#cfe0d6;
    --accent:#e8743b;      /* the orange off the Flyers tee */
    --accent-2:#f2a35e;
    --paper:#e9e4d8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(1200px 800px at 50% -10%, #243a2e 0%, #0c1410 55%, #06090a 100%);
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:40px 16px;
    overflow-x:hidden;
  }

  /* falling rain over the whole page */
  .rain{position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden}
  .rain i{
    position:absolute;top:-20vh;width:1px;height:90px;
    background:linear-gradient(transparent,rgba(207,224,214,.45));
    animation:fall linear infinite;
  }
  @keyframes fall{to{transform:translateY(140vh)}}

  .cover{
    position:relative;
    width:min(560px,100%);
    aspect-ratio:1/1;
    border-radius:14px;
    overflow:hidden;
    background:#10160f;
    box-shadow:
      0 40px 120px rgba(0,0,0,.65),
      0 2px 0 rgba(255,255,255,.05) inset;
    isolation:isolate;
  }

  /* photo layer */
  .cover .photo{
    position:absolute;inset:0;
    background-image:var(--cover-src, none);
    background-size:cover;
    background-position:50% 38%;
    filter:saturate(.92) contrast(1.05) brightness(.82);
    transform:scale(1.02);
  }
  /* fallback "rainy forest" when no photo is present */
  .cover .fallback{
    position:absolute;inset:0;
    background:
      radial-gradient(60% 40% at 50% 30%, rgba(80,110,90,.5), transparent 70%),
      repeating-linear-gradient(115deg, #16241b 0 26px, #1b2a20 26px 60px),
      linear-gradient(#1d2e23,#0b130e);
  }
  .cover .fallback::after{
    content:"DROP PHOTO HERE → hope-youre-happy.jpg";
    position:absolute;left:0;right:0;top:14px;text-align:center;
    font-size:11px;letter-spacing:.18em;color:rgba(233,228,216,.55);
  }
  /* hide fallback once a real photo loads */
  .cover.has-photo .fallback{display:none}

  /* moody grade + vignette */
  .cover .grade{
    position:absolute;inset:0;mix-blend-mode:multiply;
    background:linear-gradient(180deg, rgba(16,30,22,.15) 0%, rgba(6,10,8,.85) 100%);
  }
  .cover .vignette{
    position:absolute;inset:0;
    box-shadow:0 0 220px 40px rgba(0,0,0,.85) inset;
  }

  /* title treatment */
  .meta{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:28px;z-index:3}
  .top{display:flex;justify-content:space-between;align-items:flex-start;font-size:11px;letter-spacing:.28em;color:var(--rain);text-transform:uppercase}
  .top .badge{border:1px solid rgba(233,228,216,.45);padding:4px 9px;border-radius:999px}

  .title{margin-top:auto}
  .title .kicker{font-size:12px;letter-spacing:.4em;color:var(--accent-2);text-transform:uppercase;margin-bottom:10px}
  .title h1{
    font-family:"Arial Black","Helvetica Neue",sans-serif;
    font-weight:900;
    font-size:clamp(40px,9vw,76px);
    line-height:.92;
    text-transform:uppercase;
    letter-spacing:-.02em;
    text-shadow:0 6px 30px rgba(0,0,0,.7);
  }
  .title h1 .happy{
    color:var(--accent);
    display:inline-block;
    -webkit-text-stroke:1px rgba(255,255,255,.12);
  }
  .title .sub{
    margin-top:14px;display:flex;gap:14px;align-items:center;
    font-size:12px;letter-spacing:.12em;color:var(--fog);text-transform:uppercase
  }
  .title .sub .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

  /* subtle film grain */
  .grain{position:absolute;inset:0;z-index:4;opacity:.06;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

  .caption{margin-top:22px;text-align:center;color:var(--fog);font-size:12.5px;letter-spacing:.05em;max-width:560px}
  .caption code{color:var(--accent-2);background:rgba(0,0,0,.35);padding:1px 6px;border-radius:5px}
</style>
</head>
<body>
  <div class="rain" id="rain"></div>

  <div>
    <div class="cover" id="cover">
      <div class="fallback"></div>
      <div class="photo"></div>
      <div class="grade"></div>
      <div class="vignette"></div>
      <div class="grain"></div>

      <div class="meta">
        <div class="top">
          <span class="badge">Single</span>
          <span>Rain Sessions • Vol. 1</span>
        </div>
        <div class="title">
          <div class="kicker">A standing ovation in the storm</div>
          <h1>I Hope<br>You're <span class="happy">Happy</span></h1>
          <div class="sub">
            <span>Thumbs up, soaked through</span>
            <span class="dot"></span>
            <span>Two for two</span>
          </div>
        </div>
      </div>
    </div>

    <p class="caption" id="caption">
      Save your photo next to this file as <code>hope-youre-happy.jpg</code> and it drops straight into the frame.
    </p>
  </div>

<script>
  // build the rain
  (function(){
    const rain = document.getElementById('rain');
    const drops = 120;
    for(let i=0;i<drops;i++){
      const r = document.createElement('i');
      r.style.left = Math.random()*100 + 'vw';
      r.style.height = (60 + Math.random()*80) + 'px';
      const dur = 0.6 + Math.random()*0.9;
      r.style.animationDuration = dur + 's';
      r.style.animationDelay = (-Math.random()*dur) + 's';
      r.style.opacity = 0.25 + Math.random()*0.5;
      rain.appendChild(r);
    }
  })();

  // swap in the real photo if it exists
  (function(){
    const cover = document.getElementById('cover');
    const photo = cover.querySelector('.photo');
    const src = 'hope-youre-happy.jpg';
    const img = new Image();
    img.onload = function(){
      photo.style.setProperty('--cover-src', `url("${src}")`);
      photo.style.backgroundImage = `url("${src}")`;
      cover.classList.add('has-photo');
      const cap = document.getElementById('caption');
      if (cap) cap.style.display = 'none';
    };
    img.src = src;
  })();
</script>
</body>
</html>
